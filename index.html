<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultorios KANA</title>
  <link rel="stylesheet" href="./public/css/styles.css">
</head>
<body>

  <header class="header">
    <div class="contenedor">
      <h1>Consultorios KANA</h1>
      <p>Sistema de gestión de profesionales, pacientes y sesiones</p>
    </div>
  </header>

  <main class="contenedor">
    <section class="login-box">
      <h2>Ingreso al sistema</h2>
      <form id="loginForm">
        <div class="campo">
          <label for="dniIngreso">DNI</label>
          <input type="text" id="dniIngreso" name="dniIngreso" placeholder="Ingresá tu DNI">
        </div>

        <button type="submit" class="btn">Ingresar</button>
      </form>
    </section>
  </main>

  <script src="./public/js/main.js"></script>
</body>
</html>
