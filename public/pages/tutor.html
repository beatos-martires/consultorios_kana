<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutor - Consultorios KANA</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="header">
    <div class="contenedor">
      <h1>Panel del Tutor</h1>
      <p>Datos del paciente y resumen de pago</p>
      <a href="../../index.html" class="btn-volver">Volver al inicio</a>
    </div>
  </header>

  <main class="contenedor panel-grid">
    <section class="card">
      <h2>Buscar</h2>

      <div class="campo">
        <label for="pacienteTutor">Paciente</label>
        <select id="pacienteTutor">
          <option value="">Seleccionar</option>
        </select>
      </div>

      <div class="campo">
        <label for="mesTutor">Mes</label>
        <select id="mesTutor">
          <option value="">Todos</option>
          <option>Enero</option>
          <option>Febrero</option>
          <option>Marzo</option>
          <option>Abril</option>
          <option>Mayo</option>
          <option>Junio</option>
          <option>Julio</option>
          <option>Agosto</option>
          <option>Septiembre</option>
          <option>Octubre</option>
          <option>Noviembre</option>
          <option>Diciembre</option>
        </select>
      </div>

      <div class="campo">
        <label for="anioTutor">Año</label>
        <input type="number" id="anioTutor" placeholder="Ej: 2026">
      </div>
    </section>

    <section class="card">
      <h2>Datos del paciente</h2>
      <div id="detallePacienteTutor"></div>
    </section>

    <section class="card">
      <h2>Detalle por profesión / especialidad</h2>
      <table>
        <thead>
          <tr>
            <th>Profesión / Especialidad</th>
            <th>Sesiones</th>
            <th>Precio por sesión</th>
            <th>Subtotal</th>
          </tr>
        </thead>
        <tbody id="tablaTutor"></tbody>
      </table>
    </section>

    <section class="card total-card">
      <h2>Total a pagar</h2>
      <p class="monto-total" id="totalTutor">$0</p>
      <button class="btn" id="btnImprimirResumen">Imprimir resumen</button>
    </section>
  </main>

  <script src="../js/main.js"></script>
</body>
</html>
