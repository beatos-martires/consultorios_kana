<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Secretaría</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>Panel de Secretaría</h1>
      <button onclick="logout()">Salir</button>
    </header>

    <section class="grid-4">
      <div class="card stat-card">
        <h3>Pacientes</h3>
        <p id="statPacientes">0</p>
      </div>
      <div class="card stat-card">
        <h3>Usuarios</h3>
        <p id="statUsuarios">0</p>
      </div>
      <div class="card stat-card">
        <h3>Sesiones</h3>
        <p id="statSesiones">0</p>
      </div>
      <div class="card stat-card">
        <h3>Pagos pendientes</h3>
        <p id="statPendientes">0</p>
      </div>
    </section>

    <section class="grid-2">
      <div class="card">
        <h2>Crear / editar usuario</h2>
        <form id="usuarioForm">
          <input type="hidden" id="usuario_id" />
          <input type="text" id="usuario_nombre" placeholder="Nombre completo" required />
          <input type="text" id="usuario_dni" placeholder="DNI" required />
          <select id="usuario_rol" required>
            <option value="">Seleccionar rol</option>
            <option value="tutor">Tutor</option>
            <option value="profesional">Profesional</option>
            <option value="secretaria">Secretaría</option>
          </select>
          <select id="usuario_area_id">
            <option value="">Área (solo profesional)</option>
          </select>
          <input type="text" id="usuario_telefono" placeholder="Teléfono" />
          <input type="email" id="usuario_email" placeholder="Email" />
          <label class="inline-check">
            <input type="checkbox" id="usuario_activo" checked />
            Usuario activo
          </label>
          <button type="submit">Guardar usuario</button>
        </form>
      </div>

      <div class="card">
        <h2>Buscar paciente</h2>
        <form id="buscarPacienteForm">
          <input type="text" id="buscar_q" placeholder="Buscar por nombre o DNI" />
          <button type="submit">Buscar</button>
        </form>
        <div id="resultadoBusqueda"></div>
      </div>
    </section>

    <section class="card">
      <h2>Crear / editar paciente</h2>
      <form id="pacienteForm">
        <input type="hidden" id="paciente_id_edit" />
        <input type="text" id="nombre_completo" placeholder="Nombre completo" required />
        <input type="text" id="dni_paciente" placeholder="DNI del paciente" />
        <input type="date" id="fecha_nacimiento" />
        <input type="number" id="edad" placeholder="Edad" />
        <input type="text" id="obra_social" placeholder="Obra social" />
        <textarea id="observaciones" placeholder="Observaciones"></textarea>

        <label class="inline-check">
          <input type="checkbox" id="cud_tiene" />
          Tiene CUD
        </label>

        <input type="date" id="cud_vencimiento" />

        <label>Asignar tutor</label>
        <select id="tutor_id"></select>
        <input type="text" id="parentesco" placeholder="Parentesco" />

        <label>Asignar profesionales</label>
        <div id="profesionalesContainer"></div>

        <button type="submit">Guardar paciente</button>
      </form>

      <hr class="sep">

      <h3>Adjuntar CUD en PDF</h3>
      <form id="cudForm" enctype="multipart/form-data">
        <select id="cud_paciente_id" required></select>
        <input type="file" id="cud_pdf" accept="application/pdf" required />
        <button type="submit">Subir PDF del CUD</button>
      </form>
    </section>

    <section class="grid-2">
      <div class="card">
        <h2>Cargar sesión</h2>
        <form id="sesionForm">
          <select id="sesion_paciente_id" required></select>
          <select id="sesion_profesional_id"></select>
          <select id="sesion_area_id" required></select>
          <input type="date" id="fecha" required />
          <input type="number" id="cantidad" value="1" min="1" />
          <input type="number" id="monto_unitario" step="0.01" placeholder="Monto por sesión" required />
          <textarea id="sesion_observaciones" placeholder="Observaciones"></textarea>
          <button type="submit">Guardar sesión</button>
        </form>
      </div>

      <div class="card">
        <h2>Registrar pago mensual</h2>
        <form id="pagoForm">
          <select id="pago_paciente_id" required></select>
          <input type="number" id="pago_anio" placeholder="Año" required />
          <input type="number" id="pago_mes" placeholder="Mes (1-12)" min="1" max="12" required />
          <input type="number" id="monto_pagado" placeholder="Monto pagado" step="0.01" />
          <select id="estado_pago" required>
            <option value="pendiente">Pendiente</option>
            <option value="parcial">Parcial</option>
            <option value="pagado">Pagado</option>
          </select>
          <textarea id="pago_observaciones" placeholder="Observaciones"></textarea>
          <button type="submit">Guardar pago</button>
          <button type="button" id="btnImprimirComprobante">Imprimir comprobante</button>
        </form>
      </div>
    </section>

    <section class="card">
      <h2>Reporte mensual por área</h2>
      <form id="reporteForm" class="grid-mini">
        <input type="number" id="reporte_anio" placeholder="Año" />
        <input type="number" id="reporte_mes" placeholder="Mes" min="1" max="12" />
        <input type="date" id="reporte_desde" />
        <input type="date" id="reporte_hasta" />
        <button type="submit">Generar reporte</button>
      </form>
      <div id="resultadoReporte"></div>
    </section>

    <section class="card">
      <h2>Pacientes</h2>
      <div id="listaPacientes"></div>
    </section>

    <section class="card">
      <h2>Usuarios</h2>
      <div id="listaUsuarios"></div>
    </section>
  </main>

  <script src="/js/secretaria.js"></script>
</body>
</html>
