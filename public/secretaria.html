<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Secretaría</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>Panel de Secretaría</h1>
      <button onclick="logout()">Salir</button>
    </header>

    <section class="grid-2">
      <div class="card">
        <h2>Nuevo paciente</h2>
        <form id="pacienteForm">
          <input type="text" id="nombre_completo" placeholder="Nombre completo" required />
          <input type="number" id="edad" placeholder="Edad" />
          <input type="text" id="dni_paciente" placeholder="DNI del paciente" />
          <input type="text" id="obra_social" placeholder="Obra social" />
          <select id="area_id" required></select>
          <select id="tutor_id">
            <option value="">Seleccionar tutor</option>
          </select>
          <textarea id="grupo_familiar" placeholder="Grupo familiar"></textarea>
          <textarea id="observaciones" placeholder="Observaciones"></textarea>
          <button type="submit">Guardar paciente</button>
        </form>
      </div>

      <div class="card">
        <h2>Cargar sesión</h2>
        <form id="sesionForm">
          <select id="sesion_paciente_id" required></select>
          <select id="sesion_area_id" required></select>
          <input type="date" id="fecha" required />
          <input type="number" id="cantidad" placeholder="Cantidad de sesiones" value="1" min="1" />
          <input type="number" id="monto_unitario" placeholder="Monto por sesión" step="0.01" required />
          <textarea id="sesion_observaciones" placeholder="Observaciones"></textarea>
          <button type="submit">Guardar sesión</button>
        </form>
      </div>
    </section>

    <section class="card">
      <h2>Pacientes</h2>
      <div id="listaPacientes"></div>
    </section>
  </main>

  <script src="/js/secretaria.js"></script>
</body>
</html>
