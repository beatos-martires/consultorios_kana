<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Tutor</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>Panel Tutor</h1>
      <button onclick="logout()">Salir</button>
    </header>

    <section class="card">
      <h2>Mis pacientes</h2>
      <div id="listaPacientes"></div>
    </section>

    <section class="card">
      <h2>Consultar monto mensual</h2>
      <form id="pagoForm">
        <select id="paciente_id" required></select>
        <input type="number" id="anio" placeholder="Año" required />
        <input type="number" id="mes" placeholder="Mes (1-12)" min="1" max="12" required />
        <button type="submit">Ver monto</button>
      </form>
      <div id="resultadoPago"></div>
    </section>
  </main>

  <script src="/js/tutor.js"></script>
</body>
</html>
